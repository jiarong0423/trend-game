<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>趨勢回放 · Trend Replay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="sound.js?v=3" defer></script>
<link rel="stylesheet" href="style.css?v=3" />
</head>
<body>

<!-- ================= 登入頁 ================= -->
<div id="login-screen" class="cyber-screen">
  <div class="scanline"></div>
  <div class="grid-bg"></div>

  <div class="cyber-card">
    <div class="cyber-glitch" data-text="TREND REPLAY">TREND REPLAY</div>
    <div class="cyber-sub">// 趨勢回放 · 歷史股價沙盒</div>

    <div id="returning-box" class="hidden">
      <div class="welcome-back">歡迎回來,<br><span id="welcomeName" class="neon-cyan"></span></div>
      <div class="stats-grid">
        <div><span class="stat-label">總局數</span><span id="statGames" class="stat-val">0</span></div>
        <div><span class="stat-label">最佳報酬</span><span id="statBest" class="stat-val">—</span></div>
        <div><span class="stat-label">平均報酬</span><span id="statAvg" class="stat-val">—</span></div>
        <div><span class="stat-label">勝率</span><span id="statWin" class="stat-val">—</span></div>
      </div>
      <button id="btnEnter" class="cyber-btn big">進入系統</button>
      <button id="btnLogout" class="cyber-btn ghost">切換帳號</button>
    </div>

    <div id="newuser-box">
      <label class="field-label">// 輸入識別碼</label>
      <input id="nickInput" maxlength="12" placeholder="YOUR NAME" autocomplete="off" />
      <button id="btnLogin" class="cyber-btn big">連線</button>
      <div class="hint">資料僅存本機 · 無伺服器</div>
    </div>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
</div>

<!-- ================= 遊戲頁 ================= -->
<div id="game-screen" class="hidden">
<header>
  <h1>趨勢回放</h1>
  <div class="meta">
    <span id="stockLabel">??? ???</span>
    <span id="dateLabel">—</span>
    <span>剩餘回合 <b id="roundsLeft">100</b></span>
  </div>
  <div class="controls">
    <span class="who">👤 <b id="whoLabel">—</b></span>
    <button id="btnNew">新局</button>
    <button id="btnNext">下一步 (Space)</button>
    <button id="btnEnd" class="ghost danger">結束遊戲</button>
    <button id="btnMute" class="ghost" title="靜音">🔊</button>
    <button id="btnBack" class="ghost">登出</button>
  </div>
</header>

<main>
  <section class="chart-wrap">
    <div id="chart"></div>
  </section>

  <aside class="panel">
    <h2>交易面板</h2>
    <div class="row">
      <label>現價</label>
      <span id="priceNow" class="big">—</span>
    </div>

    <div class="row">
      <label>股數</label>
      <input id="qty" type="number" min="1000" step="1000" value="1000" />
    </div>

    <div class="row buttons">
      <button id="btnBuy" class="buy">買進</button>
      <button id="btnSell" class="sell">賣出</button>
    </div>

    <hr />

    <h3>庫存</h3>
    <div class="row"><label>持股</label><span id="pos">0</span></div>
    <div class="row"><label>均價</label><span id="avg">—</span></div>
    <div class="row"><label>未實現</label><span id="unreal">0</span></div>

    <hr />

    <h3>統計</h3>
    <div class="row"><label>現金</label><span id="cash">1,000,000</span></div>
    <div class="row"><label>總資產</label><span id="equity">1,000,000</span></div>
    <div class="row"><label>已實現</label><span id="realized">0</span></div>
    <div class="row"><label>報酬率</label><span id="roi">0.00%</span></div>

    <hr />

    <h3>交易紀錄</h3>
    <ul id="log"></ul>
  </aside>
</main>
</div>

<!-- ================= 結算頁 ================= -->
<div id="result-screen" class="cyber-screen hidden">
  <div class="scanline"></div>
  <div class="grid-bg"></div>

  <div class="cyber-card result-card">
    <div id="resultTitle" class="cyber-glitch" data-text="MISSION COMPLETE">MISSION COMPLETE</div>
    <div id="resultSub" class="cyber-sub">// 結算回報</div>

    <div class="reveal-block">
      <div class="reveal-label">個股代號</div>
      <div id="revealStock" class="reveal-stock">—</div>
      <div id="revealRange" class="reveal-range">—</div>
    </div>

    <div class="result-stats">
      <div class="rs-row">
        <span class="rs-label">最終總資產</span>
        <span id="rsEquity" class="rs-val">—</span>
      </div>
      <div class="rs-row big-row">
        <span class="rs-label">報酬率</span>
        <span id="rsRoi" class="rs-val big-val">—</span>
      </div>
      <div class="rs-row">
        <span class="rs-label">買入持有</span>
        <span id="rsBench" class="rs-val">—</span>
      </div>
      <div class="rs-row big-row">
        <span class="rs-label">超越基準</span>
        <span id="rsAlpha" class="rs-val big-val">—</span>
      </div>
      <div class="rs-row">
        <span class="rs-label">交易次數</span>
        <span id="rsTrades" class="rs-val">—</span>
      </div>
    </div>

    <div id="resultVerdict" class="verdict">—</div>

    <button id="btnAgain" class="cyber-btn big">再來一局</button>
    <button id="btnBackLogin" class="cyber-btn ghost">回首頁</button>
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
</div>

<script src="app.js?v=3"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>趨勢回放 · Trend Replay</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>趨勢回放</h1>
  <div class="meta">
    <span id="stockLabel">—</span>
    <span id="dateLabel">—</span>
    <span>剩餘回合 <b id="roundsLeft">100</b></span>
  </div>
  <div class="controls">
    <button id="btnNew">新局</button>
    <button id="btnNext">下一步 (Space)</button>
  </div>
</header>

<main>
  <section class="chart-wrap">
    <div id="chart"></div>
  </section>

  <aside class="panel">
    <h2>交易面板</h2>
    <div class="row">
      <label>現價</label>
      <span id="priceNow" class="big">—</span>
    </div>

    <div class="row">
      <label>股數</label>
      <input id="qty" type="number" min="1000" step="1000" value="1000" />
    </div>

    <div class="row buttons">
      <button id="btnBuy" class="buy">買進</button>
      <button id="btnSell" class="sell">賣出</button>
    </div>

    <hr />

    <h3>庫存</h3>
    <div class="row"><label>持股</label><span id="pos">0</span></div>
    <div class="row"><label>均價</label><span id="avg">—</span></div>
    <div class="row"><label>未實現</label><span id="unreal">0</span></div>

    <hr />

    <h3>統計</h3>
    <div class="row"><label>現金</label><span id="cash">1,000,000</span></div>
    <div class="row"><label>總資產</label><span id="equity">1,000,000</span></div>
    <div class="row"><label>已實現</label><span id="realized">0</span></div>
    <div class="row"><label>報酬率</label><span id="roi">0.00%</span></div>

    <hr />

    <h3>交易紀錄</h3>
    <ul id="log"></ul>
  </aside>
</main>

<script src="app.js"></script>
</body>
</html>
